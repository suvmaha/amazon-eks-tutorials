apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-v1
  namespace: migration-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
      version: blue
  template:
    metadata:
      labels:
        app: webapp
        version: blue
    spec:
      containers:
        - name: webapp
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: content
          configMap:
            name: blue-content
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-content
  namespace: migration-demo
data:
  index.html: |
    v1 — stable
