apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: ml-events
  namespace: kafka
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 10Gi
          deleteClaim: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  entityOperator:
    topicOperator: {}
    userOperator: {}
