apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-eks
  namespace: hello-eks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-eks
  template:
    metadata:
      labels:
        app: hello-eks
    spec:
      containers:
        - name: hello-eks
          image: ${ECR_REGISTRY}/hello-eks:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "${IMAGE_TAG}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
